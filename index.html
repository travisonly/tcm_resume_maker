<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCM Resume Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..60,400;12..60,700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan: #0cbcf5;
    --cyan-dim: #09a8dc;
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #555;
    --green: #4caf50;
    --red: #f44336;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header h1 {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 18px;
    color: var(--cyan);
    letter-spacing: -0.3px;
  }
  header span {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  /* ── MAIN LAYOUT ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    height: calc(100vh - 61px);
  }

  .panel {
    display: flex;
    flex-direction: column;
    padding: 28px 32px;
    overflow-y: auto;
  }

  .panel-left { border-right: 1px solid var(--border); }

  /* ── LABELS ── */
  .label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  /* ── TEXTAREA ── */
  textarea {
    flex: 1;
    width: 100%;
    min-height: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: #bbb;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    line-height: 1.6;
    padding: 16px;
    resize: none;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--cyan); }
  textarea::placeholder { color: #333; }

  /* ── DOC TYPE TOGGLE ── */
  .toggle-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .toggle-btn {
    flex: 1;
    padding: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .toggle-btn.active {
    background: var(--cyan);
    border-color: var(--cyan);
    color: #000;
  }
  .toggle-btn:not(.active):hover { border-color: #444; color: #aaa; }

  /* ── GENERATE BTN ── */
  #generateBtn {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    background: var(--cyan);
    color: #000;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    text-transform: uppercase;
  }
  #generateBtn:hover:not(:disabled) { background: var(--cyan-dim); }
  #generateBtn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }

  /* ── STATUS ── */
  #status {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    min-height: 18px;
    text-align: center;
  }
  #status.working { color: var(--cyan); }
  #status.done { color: var(--green); }
  #status.error { color: var(--red); }

  /* ── OUTPUT PANEL ── */
  .output-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  #downloadBtn {
    display: none;
    padding: 7px 14px;
    background: transparent;
    border: 1px solid var(--green);
    border-radius: 5px;
    color: var(--green);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
  }
  #downloadBtn:hover { background: #4caf5015; }

  #preview {
    flex: 1;
    width: 100%;
    min-height: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: auto;
    font-size: 12px;
    line-height: 1.6;
    color: #555;
    display: flex;
    align-items: center;
    justify-content: center;
    font-style: italic;
  }
  #preview.has-content {
    display: block;
    color: #bbb;
    padding: 16px;
    font-style: normal;
    font-family: 'Inter', monospace;
    font-size: 11px;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* ── INSTRUCTIONS ── */
  .instructions {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    margin-bottom: 16px;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
  }
  .instructions strong { color: #888; }
  .step {
    display: flex;
    gap: 10px;
    margin-top: 6px;
  }
  .step-num {
    width: 18px;
    height: 18px;
    background: var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--cyan);
    flex-shrink: 0;
    margin-top: 1px;
  }
</style>
</head>
<body>

<header>
  <h1>TCM Resume Engine</h1>
  <span>Paste → Generate → Print</span>
</header>

<main>

  <!-- LEFT: INPUT -->
  <div class="panel panel-left">

    <div class="instructions">
      <strong>Workflow:</strong>
      <div class="step"><div class="step-num">1</div><div>Copy the full GPT resume package output</div></div>
      <div class="step"><div class="step-num">2</div><div>Paste below, select doc type, hit Generate</div></div>
      <div class="step"><div class="step-num">3</div><div>Download HTML → Open in Chrome → Print → Save as PDF</div></div>
    </div>

    <div class="label">Document Type</div>
    <div class="toggle-row">
      <button class="toggle-btn active" onclick="setType('resume', this)">Resume</button>
      <button class="toggle-btn" onclick="setType('cover', this)">Cover Letter</button>
    </div>

    <div class="label">GPT Output</div>
    <textarea id="input" placeholder="Paste GPT resume package output here...

── RESUME CONTENT ─────────────────────────────────────

TRAVIS ADAMS | PMP, CSM
Chattanooga, TN | 571-502-4504 | email@gmail.com
..."></textarea>

    <button id="generateBtn" onclick="generate()">Generate HTML</button>
    <div id="status"></div>

  </div>

  <!-- RIGHT: OUTPUT -->
  <div class="panel panel-right">

    <div class="output-label-row">
      <div class="label">Output</div>
      <a id="downloadBtn" href="#" download="resume.html">⬇ Download HTML</a>
    </div>

    <div id="preview">Output will appear here</div>

  </div>

</main>

<script>
// ── LOCKED RESUME CSS ──────────────────────────────────────────────────────
const RESUME_CSS = `<style type="text/css">@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..60,400;12..60,700&family=Inter:wght@400;700&display=swap');
@page { size: letter; margin: 0.5in; }
body { margin: 0; padding: 0; font-family: "Inter", Arial, sans-serif; }
ul { page-break-inside: avoid; }
li { page-break-inside: avoid; }
h1 { page-break-after: avoid; }
.role-block { page-break-inside: avoid; }
ul.lst-kix_uyt86hcxmax5-0{list-style-type:none}
.lst-kix_uyt86hcxmax5-0>li:before{content:"\\0025cf   "}
li.li-bullet-0:before{margin-left:-18pt;white-space:nowrap;display:inline-block;min-width:18pt;font-size:7pt;vertical-align:middle}
ol{margin:0;padding:0}
hr{margin:0;padding:0;border:none;border-top:1pt solid #000000;}
table td,table th{padding:0}
.c20{margin-left:36pt;padding-top:0pt;padding-left:0pt;padding-bottom:0pt;line-height:1.15;orphans:2;widows:2;text-align:left}
.c9{color:#000000;font-weight:400;text-decoration:none;vertical-align:baseline;font-size:11pt;font-family:"Inter";font-style:italic}
.c14{margin-top:4pt;padding-top:0pt;padding-bottom:6pt;line-height:1.0;page-break-after:avoid;orphans:2;widows:2;text-align:left}
.c1{color:#000000;font-weight:400;text-decoration:none;vertical-align:baseline;font-size:10pt;font-family:"Bricolage Grotesque";font-style:normal}
.c7{padding-top:0pt;padding-bottom:0pt;line-height:1.0;orphans:2;widows:2;text-align:left}
.c25{padding-top:4pt;padding-bottom:3pt;line-height:1.0;orphans:2;widows:2;text-align:left}
.c16{padding-top:5pt;padding-bottom:0pt;line-height:1.0;orphans:2;widows:2;text-align:left}
.c0{padding-top:10pt;padding-bottom:3pt;line-height:1.0;orphans:2;widows:2;text-align:left}
.c2{padding-top:10pt;padding-bottom:3pt;line-height:1.0;orphans:2;widows:2;text-align:left}
.c4{vertical-align:baseline;font-size:11pt;font-family:"Inter";color:#000000;font-weight:700}
.c11{color:#000000;font-weight:700;vertical-align:baseline;font-size:13pt;font-family:"Inter"}
.c8{background-color:#ffffff;max-width:100%;padding:0;margin:0}
.c13{font-size:11pt;font-weight:700;font-family:"Bricolage Grotesque"}
.c23{font-size:25pt;font-weight:700;font-family:"Inter"}
.c10{padding:0;margin:0;margin-bottom:10pt}
.c17{page-break-after:avoid}
.role-block{page-break-inside:avoid}
li{color:#000000;font-size:10pt;font-family:"Bricolage Grotesque";margin:0;padding:0;margin-bottom:4pt}
p{margin:0;color:#000000;font-size:10pt;font-family:"Bricolage Grotesque"}
h1{padding-top:2pt;color:#000000;font-weight:700;font-size:13pt;padding-bottom:3pt;font-family:"Inter";line-height:1.0;orphans:2;widows:2;text-align:left}
</style>`;

// ── LOCKED COVER LETTER CSS ────────────────────────────────────────────────
const COVER_CSS = `<style type="text/css">@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..60,400;12..60,700&family=Inter:wght@400;700&display=swap');
@page { size: letter; margin: 1in; }
body { margin: 0; padding: 0; font-family: "Bricolage Grotesque", sans-serif; font-size: 11pt; line-height: 1.5; color: #000; }
p { margin: 0 0 12pt 0; font-size: 11pt; font-family: "Bricolage Grotesque"; color: #000; }
.header-name { font-family: "Inter"; font-size: 18pt; font-weight: 700; margin-bottom: 4pt; }
.header-contact { font-size: 10pt; color: #333; margin-bottom: 4pt; }
.date { margin-top: 24pt; margin-bottom: 24pt; font-size: 11pt; }
.salutation { margin-bottom: 12pt; }
.closing { margin-top: 24pt; }
.sig { margin-top: 36pt; font-weight: 700; font-family: "Inter"; }
hr { border: none; border-top: 1pt solid #000; margin: 6pt 0 16pt 0; }
</style>`;

// ── STATE ──────────────────────────────────────────────────────────────────
let docType = 'resume';
let generatedHTML = '';

function setType(type, btn) {
  docType = type;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── SYSTEM PROMPTS ─────────────────────────────────────────────────────────
const RESUME_SYSTEM = `You are a resume HTML formatter. Convert plain-text resume content into a complete HTML document using ONLY these locked CSS classes. Output raw HTML only — no markdown, no backticks, no explanation.

LOCKED STRUCTURE AND CLASSES:

Name line:
<p style="margin:0;padding:0;margin-bottom:3pt;line-height:1.0;"><span class="c23">FULL NAME | CREDENTIALS</span></p>

Contact line (has border-bottom rule):
<p style="margin:0;padding:0;padding-bottom:2pt;line-height:1.15;border-bottom:1pt solid #000000;"><span class="c13">City, State • Phone • Email • LinkedIn</span></p>

First section header:
<h1 class="c11 c25"><span class="c11">SECTION NAME</span></h1>

All other section headers:
<h1 class="c11 c0"><span class="c11">SECTION NAME</span></h1>

Body paragraph (summary, competencies):
<p class="c7"><span class="c1">text here</span></p>

Role block (ALWAYS wrap title + location + bullets in this div):
<div class="role-block">
  <p style="margin:0;margin-bottom:4pt;padding:0;line-height:1.0;"><span class="c4">Job Title | Company Name</span></p>
  <p class="c14"><span class="c9">City, State (MON YEAR – MON YEAR)</span></p>
  <ul class="c10 lst-kix_uyt86hcxmax5-0 start">
    <li class="c20 li-bullet-0"><span class="c1">bullet text</span></li>
  </ul>
</div>

Education / Cert / Award — first entry:
<p class="c7"><span class="c4">Title or Degree</span><br><span class="c1">Institution or context</span></p>

Education / Cert / Award — subsequent entries:
<p class="c16"><span class="c4">Title or Degree</span><br><span class="c1">Institution or context</span></p>

RULES:
- Wrap the entire body in: <div class="c8">...</div>
- EXECUTIVE SUMMARY uses first section header class (c25), all others use c0
- Do not add a REFERENCES section
- Do not deviate from these classes
- Output the full HTML document with INJECT_CSS_HERE as the placeholder where the style tag goes

Full document structure:
<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Resume</title>INJECT_CSS_HERE</head><body><div class="c8">...content...</div></body></html>`;

const COVER_SYSTEM = `You are a cover letter HTML formatter. Convert plain-text cover letter content into a complete, print-ready HTML document. Output raw HTML only — no markdown, no backticks, no explanation.

Use this structure exactly:
<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Cover Letter</title>INJECT_CSS_HERE</head>
<body>
<p class="header-name">FULL NAME</p>
<p class="header-contact">City, State | Phone | Email | LinkedIn</p>
<hr>
<p class="date">Date</p>
<p class="salutation">Dear [Hiring Team / Name],</p>
[body paragraphs as <p> tags]
<p class="closing">Sincerely,</p>
<p class="sig">Full Name</p>
</body></html>

RULES:
- Each paragraph is a separate <p> tag
- Preserve all paragraph breaks from the original
- Do not add or remove content
- Output the full HTML with INJECT_CSS_HERE as style placeholder`;

// ── GENERATE ──────────────────────────────────────────────────────────────
async function generate() {
  const input = document.getElementById('input').value.trim();
  if (!input) { setStatus('Paste content first.', 'error'); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  setStatus('Generating...', 'working');
  document.getElementById('downloadBtn').style.display = 'none';

  const preview = document.getElementById('preview');
  preview.className = '';
  preview.textContent = 'Output will appear here';

  try {
    const systemPrompt = docType === 'resume' ? RESUME_SYSTEM : COVER_SYSTEM;
    const css = docType === 'resume' ? RESUME_CSS : COVER_CSS;

    const response = await fetch('https://tcm-proxy.jtravisadams1.workers.dev/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: systemPrompt,
        messages: [{ role: 'user', content: input }]
      })
    });

    const rawText = await response.text();
    console.log('Worker raw response:', rawText.substring(0, 1000));
    
    let data;
    try { data = JSON.parse(rawText); } catch(e) {
      throw new Error('Worker returned non-JSON: ' + rawText.substring(0, 200));
    }

    if (!response.ok) {
      throw new Error('Worker error ' + response.status + ': ' + (data.error?.message || JSON.stringify(data).substring(0, 200)));
    }

    // Handle both direct Anthropic response and wrapped response
    const content = data.content || data?.result?.content || data?.response?.content;
    if (!content) {
      throw new Error('No content found. Keys: ' + Object.keys(data).join(', ') + ' | Raw: ' + rawText.substring(0, 300));
    }
    let html = content.filter(b => b.type === 'text').map(b => b.text).join('');
    html = html.replace(/```html?/gi, '').replace(/```/g, '').trim();
    html = html.replace('INJECT_CSS_HERE', css);

    generatedHTML = html;

    // Show preview (truncated)
    preview.className = 'has-content';
    preview.textContent = html.substring(0, 3000) + (html.length > 3000 ? '\n\n... [truncated for preview]' : '');

    // Build download link
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);

    // Parse filename from package ID or fallback
    const pkgMatch = input.match(/PACKAGE ID:\s*([^\n]+)/);
    let fname;
    if (pkgMatch) {
      fname = 'Adams_' + (docType === 'cover' ? 'CoverLetter_' : 'Resume_') + pkgMatch[1].trim() + '.html';
    } else {
      fname = 'Adams_' + (docType === 'cover' ? 'CoverLetter' : 'Resume') + '_' + Date.now() + '.html';
    }

    const dlBtn = document.getElementById('downloadBtn');
    dlBtn.href = url;
    dlBtn.download = fname;
    dlBtn.textContent = '⬇ ' + fname;
    dlBtn.style.display = 'inline-block';

    setStatus('Done — download and open in Chrome → Print → Save as PDF', 'done');
  } catch(e) {
    setStatus('Error: ' + e.message, 'error');
  }

  btn.disabled = false;
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls || '';
}
</script>

</body>
</html>
